name: Decision (ADR candidate)
description: A decision worth recording as an ADR
title: "[decision] "
labels: ["decision"]
body:
  - type: textarea
    id: question
    attributes:
      label: Question / problem
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Why does this need a decision now?
    validations:
      required: true
  - type: textarea
    id: options
    attributes:
      label: Options considered
    validations:
      required: true
  - type: textarea
    id: leaning
    attributes:
      label: Current leaning
      description: Which option do you currently favor and why?
