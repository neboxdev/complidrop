name: api-ci

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      ConnectionStrings__Database: ${{ secrets.TEST_DATABASE_CONNECTION }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CompliDrop.slnx

      - name: Build
        run: dotnet build CompliDrop.slnx --configuration Release --no-restore

      - name: Test
        run: |
          if [ -z "$ConnectionStrings__Database" ]; then
            echo "::warning::Tests skipped — set TEST_DATABASE_CONNECTION secret to enable MultiTenancyTests."
          else
            dotnet test CompliDrop.Api.Tests/CompliDrop.Api.Tests.csproj \
              --configuration Release --no-build --logger "console;verbosity=minimal"
          fi
