name: api-ci

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "api/**"
      - ".github/workflows/api-ci.yml"

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore CompliDrop.slnx

      - name: Build
        run: dotnet build CompliDrop.slnx --configuration Release --no-restore

      # DB strategy: integration tests provision a throwaway postgres:17-alpine database via
      # Testcontainers (see api/CompliDrop.Api.Tests/TestHelpers/IntegrationTestFixture.cs).
      # Docker is preinstalled on GitHub-hosted ubuntu runners, so no external test database
      # (and no TEST_DATABASE_CONNECTION secret) is required — the suite always runs.
      - name: Test
        run: dotnet test CompliDrop.Api.Tests/CompliDrop.Api.Tests.csproj --configuration Release --no-build --logger "console;verbosity=minimal"
