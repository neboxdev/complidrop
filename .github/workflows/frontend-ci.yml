name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.complidrop.com
        run: npm run build

  # E2E job (#38). Separate from `build` because Playwright + Chromium
  # download is expensive (~150 MB) and we don't want to slow lint/test
  # iteration; keeping the jobs parallel lets unit tests fail fast.
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cache the Playwright browser binaries between runs. Key on the
      # @playwright/test version from package-lock so a Playwright
      # upgrade busts the cache cleanly.
      - name: Read Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright (browsers + system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright (system deps only — cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E
        run: npm run test:e2e:ci

      # Secret-scan gate (ADR 0010 §Artifact hygiene). Runs AFTER the
      # Playwright job but BEFORE artifact upload. Fails the build if
      # any trace / screenshot contains cd_session, cd_refresh,
      # Authorization, portal-token, or SSN/EIN-shaped patterns.
      # `if: always()` so the scan runs even when Playwright failed —
      # a failed test produces the very artifacts most likely to leak.
      - name: Scan artifacts for secrets
        if: always()
        run: npm run test:e2e:scan

      # Upload the HTML report + traces ONLY when Playwright failed.
      # `if: failure()` skips upload on success (saves storage); the
      # scan-secrets gate above runs FIRST so a leak fails the build
      # even before this step would have uploaded anything.
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7
          # Reduce the risk of a public repo accidentally exposing the
          # artifact to anonymous viewers by NOT making it public.
          # Default visibility is the repo's permission model, which
          # is what we want.
