name: frontend-ci

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      # The requirement-catalog ⊆ extraction-prompt contract test (#272,
      # src/lib/requirements-extraction-contract.test.ts) reads this backend file, so a
      # prompt-side edit (e.g. removing a field the catalog offers) must run frontend tests.
      - "api/CompliDrop.Api/Services/Extraction/ExtractionPrompts.cs"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
      - "api/CompliDrop.Api/Services/Extraction/ExtractionPrompts.cs"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      # Standing dead-code / unused-dependency gate (#42 / epic #41). knip is the single
      # authoritative tool for dead files / unused deps / unlisted imports; its version is
      # pinned in package-lock.json so a local `npm run knip` pass guarantees a CI pass.
      # Config + scope rationale: frontend/knip.jsonc.
      - name: Knip (dead code / unused deps)
        run: npm run knip

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.complidrop.com
        run: npm run build

  # E2E job (#38). Separate from `build` because Playwright + Chromium
  # download is expensive (~150 MB) and we want unit tests to fail fast.
  # `needs: build` would slow CI; we accept that an E2E run on a broken
  # build still surfaces useful diagnostic via the Playwright step.
  e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    # The default GITHUB_TOKEN permissions on a repo that uses the
    # restricted default (Settings → Actions → Workflow permissions
    # → "Read repository contents and packages permissions") do NOT
    # include `issues: read`. The quarantine-drift step (#115) needs
    # to call `gh issue view 87`, which requires that scope.
    # `contents: read` is needed for `actions/checkout@v4`. Setting
    # permissions explicitly at job level overrides the default and
    # makes the requirement self-documenting.
    permissions:
      contents: read
      issues: read
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Type-check the e2e tree explicitly. The root tsconfig EXCLUDES
      # e2e/ + playwright.config.ts (to keep them out of the Next
      # build's type-check), so a TS error in the harness would
      # otherwise only surface when Playwright tried to run.
      - name: Type check (e2e)
        run: npx tsc -p e2e/tsconfig.json --noEmit

      # AC #6 enforcement: confirm ExtractionFixtures (synthetic
      # backend test placeholders) are NOT imported by E2E. README +
      # ADR document the convention; this step makes it mechanical.
      - name: Lint E2E imports (AC #6 — no backend imports)
        run: npm run test:e2e:lint-imports

      # Quarantine-registry drift gate (#115). Closes the (a) ↔ (c)
      # half of ADR 0010 §Flake policy: every @quarantine /
      # test.fixme marker in frontend/e2e/**/*.spec.ts must have a
      # matching `- [ ]` row in issue #87's body, and every unticked
      # row must point at a marker that still exists. Sibling shape
      # to lint-imports above. Needs GH_TOKEN to read #87 via `gh`.
      # QUARANTINE_REGISTRY_NUMBER lets a fork override the issue
      # number via repo variable; defaults to 87 in-script.
      - name: Check quarantine-registry drift (#115)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          QUARANTINE_REGISTRY_NUMBER: ${{ vars.QUARANTINE_REGISTRY_NUMBER }}
        run: npm run test:e2e:quarantine-drift

      # Cache the Playwright browser binaries. Key on the
      # @playwright/test version from package-lock so a Playwright
      # upgrade busts the cache cleanly.
      - name: Read Playwright version
        id: pw-version
        run: |
          version=$(node -p "require('@playwright/test/package.json').version")
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright (browsers + system deps)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright (system deps only — cache hit)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright E2E
        id: playwright
        run: npm run test:e2e:ci

      # Secret-scan gate (ADR 0010 §Artifact hygiene). Runs even if
      # Playwright failed — a failed test produces exactly the
      # artifacts most likely to leak. `if: always()` ensures the
      # scan runs unconditionally. We DO NOT use `posttest:e2e`'s
      # auto-hook here because we want the explicit step + step-id so
      # the upload step below can check the scan outcome.
      - name: Scan artifacts for secrets
        id: scan
        if: always()
        run: npm run test:e2e:scan

      # Upload Playwright artifacts ONLY when:
      #   1. The Playwright run itself failed (steps.playwright.outcome == 'failure'),
      #   2. AND the secret-scan succeeded (steps.scan.outcome == 'success').
      #
      # The combined gate prevents leaking artifacts: if scan fails,
      # the upload is SKIPPED, so a leaked cookie value never reaches
      # GitHub's artifact store. AC #4: "raw traces never uploaded to
      # a public artifact store" is satisfied.
      #
      # Using `if: always() && ...` rather than `if: failure() && ...`
      # because `failure()` evaluates true when ANY prior step failed
      # (including the scan), which would cause the leak-upload race
      # this gate exists to prevent.
      - name: Upload Playwright artifacts on test-failure (only if scan clean)
        if: always() && steps.playwright.outcome == 'failure' && steps.scan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/test-results/
            frontend/playwright-report/
          retention-days: 7
