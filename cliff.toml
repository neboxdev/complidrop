# git-cliff configuration for CompliDrop
# Reference: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to CompliDrop are documented in this file.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}{{ commit.message | upper_first }}\
{% if commit.github.username %} by @{{ commit.github.username }}{% endif %}\
{% if commit.github.pr_number %} in #{{ commit.github.pr_number }}{% endif %}
{% endfor %}\
{% endfor %}\n
"""
trim = true
footer = """
<!-- generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Tests" },
    { message = "^chore\\(release\\):", skip = true },
    { message = "^chore", group = "Chores" },
    { message = "^build", group = "Build" },
    { message = "^ci", group = "CI" },
    { message = "^style", skip = true },
    { body = ".*security", group = "Security" },
]
filter_commits = false
tag_pattern = "v[0-9]*"
sort_commits = "oldest"
